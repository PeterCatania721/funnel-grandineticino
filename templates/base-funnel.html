{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}{{ company.legal_name }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{% trans "Riparazione danni da grandine in Ticino senza verniciatura. Preventivo gratuito in 24 ore con KESI SA." %}{% endblock %}">
  <meta name="robots" content="index, follow">

  <link rel="icon" href="{% static 'img/favicon.png' %}">
  <link rel="preload" href="{% static 'fonts/CooperHewitt-Book.woff' %}" as="font" type="font/woff" crossorigin>
  <link rel="preload" href="{% static 'fonts/CooperHewitt-Medium.woff' %}" as="font" type="font/woff" crossorigin>
  <link rel="preload" href="{% static 'fonts/CooperHewitt-Semibold.woff' %}" as="font" type="font/woff" crossorigin>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="funnel-body funnel-page">
  {% include "partials/funnel-header.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/funnel-footer.html" %}

  <script>
  window.FUNNEL_I18N = {
    stepLabels: [
      "{% filter escapejs %}{% trans 'Contatto' %}{% endfilter %}",
      "{% filter escapejs %}{% trans 'Foto' %}{% endfilter %}",
      "{% filter escapejs %}{% trans 'Invio' %}{% endfilter %}"
    ],
    acceptTerms: "{% filter escapejs %}{% trans 'Accetta i termini per continuare.' %}{% endfilter %}",
    uploadRequired: "{% filter escapejs %}{% trans 'Carica almeno una foto del danno.' %}{% endfilter %}",
    uploadTooLarge: "{% filter escapejs %}{% trans 'Totale allegati troppo grande per l\'invio via email. Rimuovi alcuni file fino a tornare sotto i 20 MB.' %}{% endfilter %}",
    removeFile: "{% filter escapejs %}{% trans 'Rimuovi' %}{% endfilter %}",
    invalidPhone: "{% filter escapejs %}{% trans 'Inserisci un numero di telefono valido (es. +41 79 123 45 67 o +39 333 123 4567).' %}{% endfilter %}",
    invalidEmail: "{% filter escapejs %}{% trans 'Inserisci un indirizzo email valido.' %}{% endfilter %}",
    selectDelivery: "{% filter escapejs %}{% trans 'Seleziona la preferenza di appuntamento.' %}{% endfilter %}",
    requiredFields: "{% filter escapejs %}{% trans 'Compila tutti i campi obbligatori.' %}{% endfilter %}"
  };
  </script>
  <script src="{% static 'js/tel-prefix.js' %}"></script>
  <script src="{% static 'js/funnel.js' %}"></script>
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
