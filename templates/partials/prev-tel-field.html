{% load i18n %}
<div class="prev-tel-wrap">
  <span class="prev-tel-prefix" aria-hidden="true">+</span>
  <input
    class="prev-input prev-input--tel"
    type="tel"
    id="{{ id }}"
    name="telephone"
    inputmode="tel"
    autocomplete="tel"
    placeholder="{% trans '+41 79 123 45 67 o +39 333 123 4567' %}"
    title="{% trans 'Numero con prefisso internazionale, es. +41 o +39' %}"
    {% if required %}required{% endif %}
  >
</div>
