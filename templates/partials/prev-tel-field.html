{% load i18n %}
<div class="prev-tel-wrap" data-tel-prefix>
  <div class="prev-tel-country">
    <select class="prev-tel-country-select" aria-label="{% trans 'Prefisso internazionale' %}">
      <option value="+41" selected>🇨🇭 +41</option>
      <option value="+39">🇮🇹 +39</option>
      <option value="+49">🇩🇪 +49</option>
      <option value="+33">🇫🇷 +33</option>
      <option value="+43">🇦🇹 +43</option>
      <option value="+423">🇱🇮 +423</option>
      <option value="+44">🇬🇧 +44</option>
      <option value="+1">🇺🇸 +1</option>
    </select>
  </div>
  {% if field %}
    {{ field }}
  {% else %}
    <input
      class="prev-input prev-input--tel"
      type="tel"
      id="{{ id }}"
      name="{{ name|default:'telephone' }}"
      inputmode="tel"
      autocomplete="tel-national"
      placeholder="{% trans '79 123 45 67' %}"
      title="{% trans 'Numero senza prefisso internazionale' %}"
      {% if required %}required{% endif %}
      {% if value %}value="{{ value }}"{% endif %}
    >
  {% endif %}
</div>
